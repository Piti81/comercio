<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Productos</h2>

    <div class="card p-4 mb-4">

        <h4>Nuevo Producto</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">

        <input id="precio" type="number" class="form-control mb-2" placeholder="Precio">

        <input id="stock" type="number" class="form-control mb-2" placeholder="Stock">

        <select id="color" class="form-select mb-3">
            <option value="BLANCO">Blanco</option>
            <option value="NEGRO">Negro</option>
            <option value="MIEL">Miel</option>
            <option value="GRIS">Gris</option>
            <option value="WENGUE">Wengue</option>
            <option value="ROBLE">Roble</option>
            <option value="OLMO">Olmo</option>
        </select>

        <button class="btn btn-primary" onclick="guardarProducto()">
            Guardar Producto
        </button>

    </div>

    <div class="card p-4">

        <h4>Listado de Productos</h4>

        <table class="table table-striped">

            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Color</th>
            </tr>
            </thead>

            <tbody id="tablaProductos"></tbody>

        </table>

    </div>

    <a href="index.html" class="btn btn-secondary mt-4">
        Volver al inicio
    </a>

</div>

<script src="js/productos.js"></script>

</body>
</html>
